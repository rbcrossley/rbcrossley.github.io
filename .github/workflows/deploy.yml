name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Resolve site & base from repo name
        id: meta
        run: |
          echo "SITE=https://${{ github.repository_owner }}.github.io" >> $GITHUB_OUTPUT
          REPO="${{ github.event.repository.name }}"
          # If the repo is <user>.github.io we serve at root, otherwise under /<repo>/
          if [ "$REPO" = "${{ github.repository_owner }}.github.io" ]; then
            echo "BASE=/" >> $GITHUB_OUTPUT
          else
            echo "BASE=/$REPO/" >> $GITHUB_OUTPUT
          fi

      - name: Build with Astro
        env:
          SITE: ${{ steps.meta.outputs.SITE }}
          BASE: ${{ steps.meta.outputs.BASE }}
        run: yarn build

      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
